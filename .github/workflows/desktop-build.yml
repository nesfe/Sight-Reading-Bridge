name: Desktop Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    name: Electron ${{ matrix.platform }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - macos-latest
          - ubuntu-24.04
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Linux packaging dependencies
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build renderer
        run: npm run build

      - name: Build desktop bundles
        run: npx electron-builder --publish never

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: sight-reading-bridge-${{ matrix.platform }}
          path: |
            release/*.AppImage
            release/*.deb
            release/*.rpm
            release/*.dmg
            release/*.zip
            release/*.exe
          if-no-files-found: error
